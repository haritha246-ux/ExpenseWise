<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Profile - ExpenseWise</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #e6f4ea;
      color: #1b3a1b;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
    }

    .profile-container {
      width: 90%;
      max-width: 400px;
      background-color: #ffffff;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .profile-container img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #56ab2f;
      margin-bottom: 20px;
    }

    .profile-container h2 {
      margin: 10px 0;
      color: #3e7d1f;
    }

    .profile-container p {
      margin: 5px 0;
      font-size: 16px;
      color: #333;
    }

    .back-button {
      margin-top: 30px;
      padding: 12px 25px;
      border: none;
      background-color: #56ab2f;
      color: white;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .back-button:hover {
      background-color: #3e7d1f;
    }
  </style>
</head>
<body>

  <div class="profile-container">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="User Profile">
    <h2>Jane Doe</h2> 
    <p><strong>Email:</strong> jane.doe@example.com</p>
    <p><strong>Member Since:</strong> Jan 2025</p>

    <a href="home.html" class="back-button">Back to Home</a>
  </div>

</body>
</html>

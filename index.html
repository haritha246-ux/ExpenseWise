<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home - ExpenseWise</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #e6f4ea;
      color: #1b3a1b;
    }

    nav {
      background-color: #56ab2f;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-links {
      display: flex;
      gap: 20px;
    }
    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 6px 12px;
      border-radius: 5px;
      transition: 0.3s;
    }
    .nav-links a:hover {
      background-color: #3e7d1f;
    }

    .profile-icon img {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer;
      transition: 0.3s;
    }
    .profile-icon img:hover {
      transform: scale(1.1);
      border-color: #dff5d8;
    }

    .welcome {
      text-align: center;
      margin: 50px auto;
    }
    .welcome h1 {
      color: #3e7d1f;
      margin-bottom: 15px;
    }
    .welcome p {
      font-size: 16px;
      color: #333;
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-links">
      <a href="categories.html">Categories</a>
      <a href="set-plan.html">Set Plan</a>
      <a href="view-plan.html">View Plan</a>
      <a href="login.html">Logout</a>
    </div>
    <div class="profile-icon">
      <a href="profile.html">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="User">
      </a>
    </div>
  </nav>

  <div class="welcome">
    <h1>Welcome to ExpenseWise</h1>
    <p>Track your expenses, set savings goals, and manage your finances effectively.</p>
  </div>

</body>
</html>

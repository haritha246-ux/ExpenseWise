<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Set Saving Plan</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #e6f4ea; 
      color: #1b3a1b;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h2 {
      color: #3e7d1f;
      margin-top: 40px;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-section {
      background-color: white;
      padding: 30px 25px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      max-width: 400px;
      width: 100%;
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      margin-top: 5px;
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      background-color: #56ab2f;
      color: white;
      border: none;
      padding: 14px 0;
      margin-top: 20px;
      width: 100%;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button:hover {
      background-color: #3e7d1f;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.3);
    }

    .bottom-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 10px auto 40px auto;
      width: 100%;
      max-width: 400px;
    }

    .bottom-buttons button {
      flex: 1;
      margin-top: 0;
    }

    @media (max-width: 500px) {
      .form-section {
        padding: 20px;
      }
      button {
        font-size: 14px;
        padding: 12px 0;
      }
    }
  </style>
</head>
<body>

  <h2>Set Your Saving Plan</h2>

  <div class="form-section">
    <label for="goal">Savings Goal (₹):</label>
    <input type="number" id="goal" placeholder="e.g. 50000">

    <label for="income">Monthly Income (₹):</label>
    <input type="number" id="income" placeholder="e.g. 30000">

    <label for="months">Number of Months to Achieve Goal:</label>
    <input type="number" id="months" placeholder="e.g. 6">

    <button>Save / Analyze Plan</button>
  </div>

  <div class="bottom-buttons">
    <button onclick="window.location.href='home.html'">Back to Home</button>
    <button onclick="window.location.href='view-plan.html'">View Plan</button>
  </div>

</body>
</html>
